name: Deploy to GitHub Pages

on:
  push:
    # claude/infocom-text-adventure-emulator-32pzp3 is the branch actually serving as
    # trunk (see IMPLEMENTATION_PLAN.md); main was added later for GitHub Pages'
    # sake but hasn't been made the repo default yet, so both are listed here.
    branches: [main, claude/infocom-text-adventure-emulator-32pzp3]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
